<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion — File System Monitor</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
    .card { background: #1e293b; padding: 2rem; border-radius: 12px; width: 100%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,.4); }
    h1 { font-size: 1.25rem; margin: 0 0 1rem; }
    label { display: block; margin-bottom: .35rem; font-size: .875rem; color: #94a3b8; }
    input { width: 100%; padding: .6rem .75rem; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #f8fafc; margin-bottom: 1rem; }
    button { width: 100%; padding: .75rem; border: none; border-radius: 8px; background: #3b82f6; color: white; font-weight: 600; cursor: pointer; }
    button:hover { background: #2563eb; }
    .err { color: #f87171; font-size: .875rem; margin-bottom: 1rem; }
    .hint { font-size: .75rem; color: #64748b; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>File System Monitor</h1>
    {% if error %}<p class="err">{{ error }}</p>{% endif %}
    <form method="post" action="{{ url_for('login') }}">
      <label for="username">Identifiant</label>
      <input id="username" name="username" autocomplete="username" required>
      <label for="password">Mot de passe</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">Se connecter</button>
    </form>
    <p class="hint">Accès réservé aux administrateurs.</p>
  </div>
</body>
</html>
